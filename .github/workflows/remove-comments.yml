name: Strip All Comments and Headers

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  remove-comments:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Strip All XML Comments
        run: |
          echo "Removing all comments from XML files..."
          # This removes everything between including the tags themselves
          find app/src/main/ -type f -name "*.xml" -exec perl -0777 -pi -e 's/\n*//g' {} +

      - name: Strip All Java Comments
        run: |
          echo "Removing all comments from Java files..."
          # 1. Remove multi-line comments (/* ... */) and Javadoc (/** ... */)
          find app/src/main/ -type f -name "*.java" -exec perl -0777 -pi -e 's/\/\*[\s\S]*?\*\/\n*//g' {} +
          
          # 2. Remove single-line comments (// ...) 
          # We use a regex that avoids matching // inside strings (http://)
          find app/src/main/ -type f -name "*.java" -exec sed -i 's|\/\/.*||g' {} +
          
          # 3. Remove resulting empty lines to keep the file compact
          find app/src/main/ -type f -name "*.java" -exec sed -i '/^[[:space:]]*$/d' {} +

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add -u
          
          if git diff-index --quiet HEAD --; then
            echo "No comments found to delete."
          else
            git commit -m "chore: complete strip of all comments and documentation"
            git push
            echo "Project is now comment-free."
          fi
