name: Ultimate Strip All Comments

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  remove-comments:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Strip All XML Comments
        run: |
          echo "Removing all XML comments including inline headers..."
          # 1. Specifically target comments that appear immediately after the XML declaration
          find app/src/main/ -type f -name "*.xml" -exec perl -0777 -pi -e 's/(<\?xml.*?\?>)\s*/$1/g' {} +
          
          # 2. Remove any other remaining XML comments
          find app/src/main/ -type f -name "*.xml" -exec perl -0777 -pi -e 's/\n*//g' {} +
          
          # 3. Clean up leading/trailing whitespace
          find app/src/main/ -type f -name "*.xml" -exec sed -i 's/^[[:space:]]*//; s/[[:space:]]*$//' {} +

      - name: Strip All Java Comments
        run: |
          echo "Removing all Java comments (/* */, /** */, //)..."
          # 1. Remove multi-line and Javadoc comments
          find app/src/main/ -type f -name "*.java" -exec perl -0777 -pi -e 's/\/\*[\s\S]*?\*\/\n*//g' {} +
          
          # 2. Remove single-line comments but protect URL strings (http://)
          # This regex matches // only if not preceded by a colon
          find app/src/main/ -type f -name "*.java" -exec sed -i 's|(?<!:)\/\/.*||g' {} +
          
          # 3. Final cleanup: Remove all empty lines to collapse the code
          find app/src/main/ -type f -name "*.java" -exec sed -i '/^[[:space:]]*$/d' {} +

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add -u
          
          if git diff-index --quiet HEAD --; then
            echo "No comments found to delete."
          else
            git commit -m "chore: final aggressive strip of all comments and headers"
            git push
            echo "All comments successfully removed."
          fi
